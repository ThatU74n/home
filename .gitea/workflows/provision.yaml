---
name: Provision Kubernetes Cluster

on:
  push:
    branches:
      - main
    paths:
      - configuration/**
      - infrastructure/**

jobs:
  provision:
    name: Provision Kubernetes Cluster
    runs-on: infra
    env:
      TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_USER }}!${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 #v4.0.0
        with:
          terraform_version: 1.14.3

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      - name: Setup SSH Public key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_ed25519.pub

      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init

      - name: Terraform Apply
        run: |
          cd infrastructure
          terraform apply -auto-approve

  configure_control_plane:
    name: Configure Kubernetes Control Plane
    runs-on: infra
    needs: provision
    env:
      PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
      PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
      PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 #v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible Collections
        run: |
          cd configuration
          ansible-galaxy collection install -r requirements.yaml

      - name: Prepare Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_password.txt

      - name: Configure Control Plane
        run: |
          cd configuration
          ansible-playbook --vault-password-file ../vault_password.txt -i inventory/ playbooks/control_plane.yaml

  configure_worker:
    name: Configure Kubernetes Worker
    runs-on: infra
    needs: provision
    env:
      PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
      PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
      PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 #v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible Collections
        run: |
          cd configuration
          ansible-galaxy collection install -r requirements.yaml

      - name: Prepare Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_password.txt

      - name: Configure Worker
        run: |
          cd configuration
          ansible-playbook --vault-password-file ../vault_password.txt -i inventory/ playbooks/worker.yaml

  verify:
    name: Verify Kubernetes Cluster
    runs-on: infra
    needs:
      - configure_control_plane
      - configure_worker
    if: needs.configure_control_plane.result == 'success' && needs.configure_worker.result == 'success'
    env:
      PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
      PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
      PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 #v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install python dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible Collections
        run: |
          cd configuration
          ansible-galaxy collection install -r requirements.yaml

      - name: Prepare Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_password.txt

      - name: Verify Cluster
        id: verify
        run: |
          cd configuration
          ansible-playbook --vault-password-file ../vault_password.txt -i inventory/ playbooks/local.yaml
          kubectl get nodes -o wide
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

  report:
    name: Report Kubernetes Cluster Status
    runs-on: infra
    needs:
      - provision
      - configure_control_plane
      - configure_worker
      - verify
    if: always()
    steps:
      - name: Report Cluster status
        env:
          verification_result: ${{ needs.verify.result }}
        run: |
          if [ "${{ needs.verify.result }}" == "success" ]; then
            echo "Cluster is healthy and ready to use."
          else
            echo "Cluster provisioning or configuration failed. Please check the logs for details."
