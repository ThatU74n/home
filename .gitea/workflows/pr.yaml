---
name: Pull Request CI

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

jobs:
  terraform-dry-run:
    name: Terraform Dry Run
    runs-on: infra
    outputs:
      terraform_dry_run: ${{ steps.terraform_dry_run.outputs.terraform_dry_run }}
    env:
      TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_USER }}!${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 #v4.0.0
        with:
          terraform_version: 1.14.3

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: |
          cd infrastructure
          terraform init

      - name: Terraform Plan
        run: |
          cd infrastructure
          terraform plan -out=tfplan.out
          terraform show -no-color tfplan.out > plan_output.txt

      - name: Register to Github Output
        id: terraform_dry_run
        run: |
          PLAN_OUTPUT=$(cat infrastructure/plan_output.txt)
          echo "terraform_dry_run=$PLAN_OUTPUT" >> $GITHUB_OUTPUT

  ansible-dry-run:
    name: Ansible Dry Run
    runs-on: infra
    outputs:
      ansible_dry_run: ${{ steps.ansible_dry_run.outputs.ansible_dry_run }}
    env:
      PROXMOX_USER: ${{ secrets.PROXMOX_USER }}
      PROXMOX_TOKEN_ID: ${{ secrets.PROXMOX_TOKEN_ID }}
      PROXMOX_TOKEN_SECRET: ${{ secrets.PROXMOX_TOKEN_SECRET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 #v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: 3.12
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install python dependencies
        run: |
          pip install -r requirements.txt

      - name: Prepare Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault_password.txt

      - name: Ansible Dry Run
        id: ansible_dry_run
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          cd configuration
          touch ansible_dry_run_output.txt
          ansible-playbook --vault-password-file=../vault_password.txt --check --diff playbooks/control_plane.yaml | tee ansible_dry_run_output.txt 
          echo "\n ---\n" >> ansible_dry_run_output.txt
          ansible-playbook --vault-password-file=../vault_password.txt --check --diff playbooks/worker.yaml | tee -a ansible_dry_run_output.txt 
          ANSIBLE_OUTPUT=$(cat ansible_dry_run_output.txt)
          echo "ansible_dry_run=$ANSIBLE_OUTPUT" >> $GITHUB_OUTPUT

  report:
    name: PR Report
    runs-on: infra
    needs:
      - terraform-dry-run
      - ansible-dry-run
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v4

      - name: Comment on PR
        env:
          GITEA_SERVER_URL: http://gitea_server:3000
          GITEA_SERVER_TOKEN: ${{ secrets.TOKEN }}
          REPO: utan/home
          PR_NUMBER: ${{ gitea.event.pull_request.number }}
          TERRAFORM_RESULT: ${{ needs.terraform-dry-run.result == 'success' && needs.terraform-dry-run.outputs.terraform_dry_run || '' }}
          ANSIBLE_RESULT: ${{ needs.ansible-dry-run.result == 'success' && needs.ansible-dry-run.outputs.ansible_dry_run || '' }}
        run: |
          echo "Targeting Repo: $REPO"
          echo "Targeting PR: $PR_NUMBER"
          echo "Terraform Result: $TERRAFORM_RESULT"
          echo "Ansible Result: $ANSIBLE_RESULT"

          if [[ ! -z "$TERRAFORM_RESULT" ]]; then
            curl -s -X POST \
              -H "Authorization: token $GITEA_SERVER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"$TERRAFORM_RESULT\"}" \
              "$GITEA_SERVER_URL/api/v1/repos/$REPO/issues/$PR_NUMBER/comments"
          fi

          if [[ ! -z "$ANSIBLE_RESULT" ]]; then
            curl -s -X POST \
              -H "Authorization: token $GITEA_SERVER_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"$ANSIBLE_RESULT\"}" \
              "$GITEA_SERVER_URL/api/v1/repos/$REPO/issues/$PR_NUMBER/comments"
          fi
