---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: tailscale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: http://192.168.1.20:3000/utan/home.git
      targetRevision: main
      ref: home

    - repoURL: https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      targetRevision: 1.94.2
      helm:
        valueFiles:
          - $home/k8s/deployments/tailscale/values.yaml

    - repoURL: http://192.168.1.20:3000/utan/home.git
      targetRevision: main
      path: k8s/deployments/tailscale
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
