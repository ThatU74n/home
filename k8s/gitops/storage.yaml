---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: storage
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: http://192.168.1.20:3000/utan/home.git
      targetRevision: main
      ref: home

    - repoURL: https://charts.longhorn.io/
      chart: longhorn
      targetRevision: v1.11.1
      helm:
        valueFiles:
          - $home/k8s/deployments/longhorn/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      enabled: false
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
