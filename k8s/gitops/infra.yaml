---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: infra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: http://192.168.1.20:3000/utan/home.git
    targetRevision: main
    path: k8s/manifests/
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      enabled: ture
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
