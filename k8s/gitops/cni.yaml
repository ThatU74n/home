---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: cni
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: http://192.168.1.20:3000/utan/home.git
      targetRevision: main
      ref: home

    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: 1.19.2
      helm:
        valueFiles:
          - $home/k8s/deployments/cilium/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
