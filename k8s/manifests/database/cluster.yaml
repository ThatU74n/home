---
kind: Cluster
apiVersion: postgresql.cnpg.io/v1
metadata:
  name: postgres
  namespace: infra
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 50Gi
    storageClass: longhorn
  managed:
    roles:
      - name: postgres-user
        login: true
        passwordSecret:
          name: postgres-auth
