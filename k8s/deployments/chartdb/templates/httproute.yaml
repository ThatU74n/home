kind: HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: "{{ .Release.Name }}"
spec:
  parentRefs:
    - name: "{{ .Values.gateway.name }}"
      namespace: "{{ .Values.gateway.namespace }}"
      sectionName: "{{ .Values.gateway.sectionName }}"
  hostnames:
    - chartdb.local
  rules:
    - backendRefs:
        - name: "{{ .Release.Name }}"
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
