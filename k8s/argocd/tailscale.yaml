---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: tailscale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/ThatU74n/home.git
      targetRevision: main
      ref: home

    - repoURL: https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      targetRevision: 1.94.2
      helm:
        valueFiles:
          - $home/k8s/helm/values.yaml

    - repoURL: https://github.com/ThatU74n/home.git
      targetRevision: main
      path: k8s/helm/tailscale
      directory:
        recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
