---
kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: tailscale
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    - repoURL: https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      targetRevision: 1.94.2
      helm:
        valueFiles:
          - $home/k8s/helm/tailscale/values.yaml
    - repoURL: https://github.com/ThatU74n/home.git
      targetRevision: HEAD
      ref: home
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
