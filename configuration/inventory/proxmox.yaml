---
plugin: community.proxmox.proxmox
url: https://192.168.1.7:8006
validate_certs: false
want_facts: true

compose:
  ansible_host: proxmox_ipconfig0.ip | split('/') | first

keyed_groups:
  - key: proxmox_tags_parsed
    separator: ""
groups:
  gitea: "'gitea' in (proxmox_tags_parsed | list)"
  control_plane: "'control_plane' in (proxmox_tags_parsed | list)"
  worker: "'worker' in (proxmox_tags_parsed | list)"
