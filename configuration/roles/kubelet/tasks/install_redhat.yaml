---
- name: Install dependencies
  become: true
  ansible.builtin.yum:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Kubernetes repository
  become: true
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes - $basearch
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ _kubernetes_minor_version }}/rpm"
    enabled: true
    gpgcheck: true 
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ _kubernetes_minor_version }}/rpm/repodata/repomd.xml.key"
  notify: Update dnf cache

- name: Flush handler
  ansible.builtin.meta: flush_handlers

- name: Install Kubelet
  become: true
  ansible.builtin.dnf:
    name: "kubelet"
    allow_downgrade: true
    state: present
