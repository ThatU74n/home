---
# Fetch CA cert
- name: Write Kubernetes CA 
  become: true
  no_log: true 
  ansible.builtin.copy:
    dest: "{{ kubernetes_pki_dir }}/ca.crt"
    content: "{{ kubernetes_ca_cert_content }}"
    owner: root
    group: root
    mode: "0644"

# Kubelet key - cert 
- name: Generate Kubelet key
  become: true
  register: kubelet_key
  community.crypto.openssl_privatekey:
    path: "{{ kubernetes_pki_dir }}/kubelet.key"
    size: 2048

- name: Generate CSR for Kubelet
  become: true
  register: kubelet_csr
  changed_when: kubelet_key.changed 
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ kubernetes_pki_dir }}/kubelet.key"
    common_name: "system:node:{{ inventory_hostname }}"
    organization_name: "system:nodes"

- name: Sign Kubelet certificate
  become: true
  community.crypto.x509_certificate:
    path: "{{ kubernetes_pki_dir }}/kubelet.crt"
    csr_content: "{{ kubelet_csr.csr }}"
    provider: ownca
    ownca_content: "{{ kubernetes_ca_cert_content }}"
    ownca_privatekey_content: "{{ kubernetes_ca_key_content }}"

# Kubelet service key - cert
- name: Generate Kubelet serving key
  become: true
  register: kubelet_serving_key
  community.crypto.openssl_privatekey:
    path: "{{ kubernetes_pki_dir }}/kubelet-serving.key"
    size: 2048

- name: Generate CSR for Kubelet serving
  become: true
  register: kubelet_serving_csr
  changed_when: kubelet_serving_key.changed
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ kubernetes_pki_dir }}/kubelet-serving.key"
    common_name: "{{ inventory_hostname }}"
    subject_alt_name:
      - "IP:{{ hostvars[inventory_hostname]['ansible_host'] }}"
      - "DNS:{{ inventory_hostname }}"

- name: Sign Kubelet serving certificate
  become: true
  community.crypto.x509_certificate:
    path: "{{ kubernetes_pki_dir }}/kubelet-serving.crt"
    csr_content: "{{ kubelet_serving_csr.csr }}"
    provider: ownca
    ownca_content: "{{ kubernetes_ca_cert_content }}"
    ownca_privatekey_content: "{{ kubernetes_ca_key_content }}"
