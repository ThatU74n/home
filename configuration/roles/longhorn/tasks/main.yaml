---
- name: Install Longhorn dependencies
  become: true
  ansible.builtin.apt:
    name:
      - open-iscsi
      - nfs-common
      - curl
      - util-linux  # provides findmnt, blkid, lsblk
      - grep
      - gawk
    state: present

- name: Enable and start iscsid
  become: true
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started