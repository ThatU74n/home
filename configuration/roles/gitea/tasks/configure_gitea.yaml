---
- name: Create Gitea admin user
  when: gitea_admin_user_check.rc | default(1) != 0
  community.docker.docker_container_exec:
    container: gitea_server
    argv:
      - /bin/sh
      - -c
      - "gitea --work-path /var/lib/gitea admin user create --username {{ gitea_admin_user }} --password {{ gitea_admin_password }} --email {{ gitea_admin_email }} --admin"
