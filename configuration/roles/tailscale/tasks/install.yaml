---
- name: Download Tailscale GPG key
  become: true
  when: not tailscale_repository_check.stat.exists
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"

- name: Add Tailscale repository
  become: true
  when: not tailscale_repository_check.stat.exists
  ansible.builtin.deb822_repository:
    name: tailscale
    types: deb
    uris: "https://pkgs.tailscale.com/stable/debian"
    suites: trixie
    components: main
    signed_by: /etc/apt/keyrings/tailscale.gpg
    state: present
    enabled: true

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
